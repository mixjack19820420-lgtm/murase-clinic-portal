  { id:2, category:"診療", title:"X線撮影手順", icon:"🦷", updated:"2025/02", color:"#6C63FF", content:"", notes:"" },

  { label:"新患数", current:38, target:50, unit:"人/月", icon:"🆕", color:"#FF6584" },

function generateShifts(staffList) {
  const names = staffList.filter(s => !s.admin).map(s => s.name);
  const patterns = ["09:00-18:00","09:00-14:00","13:00-18:00","休"];
  const dayNames = ["日","月","火","水","木","金","土"];
  return Array.from({ length: 28 }, (_, i) => {
    const date = new Date(2026, 3, 6 + i);
    const dow = date.getDay();
    const isSunday = dow === 0, isSat = dow === 6;
    const shifts = {};
    names.forEach(name => {
      if (isSunday) { shifts[name] = "休"; return; }
      if (isSat && Math.random() < 0.4) { shifts[name] = "休"; return; }
      const r = Math.random() * 10;
      shifts[name] = r < 5 ? patterns[0] : r < 7 ? patterns[1] : r < 8 ? patterns[2] : patterns[3];
    });
    return { label:`${date.getMonth()+1}/${date.getDate()}(${dayNames[dow]})`, dow, isSunday, isSat, shifts };
  });
}

const avatarChar = name => name.slice(0, 1);
const fmt = n => n >= 10000 ? `${(n/10000).toFixed(1)}万` : n.toLocaleString();

function App() {
  const [screen, setScreen] = useState(SCREENS.HOME);
  const [currentUser] = useState(INIT_STAFF[0]);
  const isAdmin = currentUser.admin;

  const [staffList, setStaffList] = useState(INIT_STAFF);
  const [staffEditTarget, setStaffEditTarget] = useState(null);
  const [showAddStaff, setShowAddStaff] = useState(false);
  const [newName, setNewName] = useState(""); const [newRole, setNewRole] = useState("歯科衛生士");
  const [newColor, setNewColor] = useState(AVATAR_COLORS[2]); const [newAdmin, setNewAdmin] = useState(false);
  const [deleteConfirm, setDeleteConfirm] = useState(null);

  const [goals, setGoals] = useState(ANNUAL_GOALS);
  const [editGoal, setEditGoal] = useState(null);
  const [salesTab, setSalesTab] = useState("overview"); // overview | monthly | category

  const [apiKey, setApiKey] = useState("");
  const [reqStaff, setReqStaff] = useState("田中");
  const [reqYear, setReqYear] = useState(2026);
  const [reqMonth, setReqMonth] = useState(4);
  const [reqDays, setReqDays] = useState({}); // {date: type}
  const [reqSubmitting, setReqSubmitting] = useState(false);
  const [reqResult, setReqResult] = useState(null);
  const [closingDate, setClosingDate] = useState("2026-03-29");
  const [closingText, setClosingText] = useState("");
  const [closingLoading, setClosingLoading] = useState(false);
  const [closingResult, setClosingResult] = useState(null);
  const [closingHistory, setClosingHistory] = useState([]);

  const categories = ["全て", ...new Set(manuals.map(m => m.category))];
  const filteredManuals = manualCategory === "全て" ? manuals : manuals.filter(m => m.category === manualCategory);
  const latestMonth = salesData[salesData.length - 1];
  const prevMonth = salesData[salesData.length - 2];
  const momChange = ((latestMonth.revenue - prevMonth.revenue) / prevMonth.revenue * 100).toFixed(1);

  const addStaff = () => {

    setStaffList(prev => [...prev, { id:Date.now(), name:newName.trim(), role:newRole, color:newColor, admin:newAdmin }]);

  const generateManual = async () => {
    if (!closingText.trim()) return;
    setClosingLoading(true); setClosingResult(null);
    try {
      const prompt = `あなたは歯科医院スタッフ向けマニュアル作成の専門家です。終礼メモをもとに、以下のJSON形式のみで返してください。説明・前置き・コードブロック記号は不要です。JSONだけ返してください。\n\n終礼日: ${closingDate}\n終礼メモ: ${closingText}\n\n{"title":"タイトル","category":"診療","points":["要点1","要点2","要点3"],"notes":"注意事項またはnull"}\n\ncategoryは診療・受付・滅菌・感染・緊急対応・その他のいずれか。`;

      // GAS経由でAnthropicAPIを呼ぶ
      const response = await fetch(GAS_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain" },
        body: JSON.stringify({ action: "ai_manual", prompt })
      });

      const data = await response.json();

      if (data.error) {
        setClosingResult({ error: `APIエラー: ${data.error}` });
        setClosingLoading(false);
        return;
      }

      const aiText = (data.text || "").trim();
      const jsonMatch = aiText.match(/\{[\s\S]*\}/);
      if (!jsonMatch) {
        setClosingResult({ error: `JSONなし。AIの返答: ${aiText.slice(0, 200)}` });
        setClosingLoading(false);
        return;
      }

      const parsed = JSON.parse(jsonMatch[0]);
      setClosingResult(parsed);

    } catch(e) {
      setClosingResult({ error: `例外: ${e.name}: ${e.message}` });
    }
    setClosingLoading(false);
  };
  const addToManual = () => {
    if (!closingResult||closingResult.error) return;
    setManuals(prev => [{ id:Date.now(), category:closingResult.category||"その他", title:closingResult.title, icon:"📝", updated:closingDate.slice(0,7).replace("-","/"), color:CAT_COLORS[closingResult.category]||"#4facfe", content:closingResult.points?.join("\n")||"", notes:closingResult.notes||"", fromClosing:true }, ...prev]);

        headers: { "Content-Type": "text/plain" },

          data: {

            year: reqYear,
            month: reqMonth,
            requests,
            submittedAt: new Date().toISOString()
          }
        })
      });

      if (data.error) throw new Error(data.error);
      setReqResult({ success: true, message: data.message });

  return (

      {/* Header */}

        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>

          </div>
          <div style={{ display:"flex", alignItems:"center", gap:10 }}>
            <div style={{ position:"relative" }}>
              <span style={{ fontSize:22 }}>🔔</span>
              <div style={{ position:"absolute", top:-2, right:-2, width:10, height:10, background:"#FF6584", borderRadius:"50%", border:"2px solid white" }} />
            </div>
            <Btn onClick={() => go(SCREENS.STAFF)} style={{ width:36, height:36, borderRadius:"50%", background:"rgba(255,255,255,.25)", fontSize:15, fontWeight:800, color:"white", border:"2px solid rgba(255,255,255,.5)" }}>

      <div style={{ flex:1, overflow:"auto", paddingBottom:76 }}>

              <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.5)", zIndex:200, display:"flex", alignItems:"flex-end", justifyContent:"center" }}>
                <div style={{ background:"white", borderRadius:"24px 24px 0 0", padding:24, width:"100%", maxWidth:430, maxHeight:"85vh", overflow:"auto" }}>
                  <div style={{ fontSize:17, fontWeight:800, color:"#1A1A3A", marginBottom:20 }}>✏️ スタッフ編集</div>
                  <div style={{ marginBottom:14 }}>
                    <div style={{ fontSize:13, fontWeight:700, color:"#6C63FF", marginBottom:6 }}>名前</div>
                    <input value={staffEditTarget.name} onChange={e => setStaffEditTarget({...staffEditTarget, name:e.target.value})} style={{ width:"100%", border:"1.5px solid #E8EEFF", borderRadius:12, padding:"10px 14px", fontSize:14, outline:"none", boxSizing:"border-box" }} />
                  </div>
                  <div style={{ marginBottom:14 }}>
                    <div style={{ fontSize:13, fontWeight:700, color:"#6C63FF", marginBottom:6 }}>役職</div>
                    <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
                      {ROLES.map(r => <Btn key={r} onClick={() => setStaffEditTarget({...staffEditTarget, role:r})} style={{ padding:"7px 14px", borderRadius:24, background:staffEditTarget.role===r?"#6C63FF":"#F4F6FB", color:staffEditTarget.role===r?"white":"#5A5A7A", fontSize:13, fontWeight:700 }}>{r}</Btn>)}
                    </div>
                  </div>
                  <div style={{ marginBottom:20 }}>
                    <div style={{ fontSize:13, fontWeight:700, color:"#6C63FF", marginBottom:6 }}>カラー</div>
                    <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                      {AVATAR_COLORS.map(c => <Btn key={c} onClick={() => setStaffEditTarget({...staffEditTarget, color:c})} style={{ width:32, height:32, borderRadius:"50%", background:c, border:staffEditTarget.color===c?"3px solid #1A1A3A":"3px solid transparent" }} />)}
                    </div>
                  </div>
                  <div style={{ display:"flex", gap:10 }}>
                    <Btn onClick={() => setStaffEditTarget(null)} style={{ flex:1, padding:14, borderRadius:14, background:"#F4F6FB", color:"#7A7A9A", fontSize:14, fontWeight:700 }}>キャンセル</Btn>
                    <Btn onClick={saveEdit} style={{ flex:2, padding:14, borderRadius:14, background:"linear-gradient(135deg,#6C63FF,#9B8FFF)", color:"white", fontSize:14, fontWeight:800 }}>保存</Btn>
                  </div>
                </div>
              </div>
            )}
            {deleteConfirm && (
              <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,.5)", zIndex:200, display:"flex", alignItems:"center", justifyContent:"center", padding:24 }}>
                <div style={{ background:"white", borderRadius:20, padding:24, width:"100%", maxWidth:360 }}>
                  <div style={{ fontSize:16, fontWeight:800, color:"#1A1A3A", marginBottom:8 }}>スタッフを削除しますか？</div>
                  <div style={{ fontSize:14, color:"#7A7A9A", marginBottom:20 }}>「{staffList.find(s => s.id===deleteConfirm)?.name}」を削除します。</div>
                  <div style={{ display:"flex", gap:10 }}>
                    <Btn onClick={() => setDeleteConfirm(null)} style={{ flex:1, padding:12, borderRadius:14, background:"#F4F6FB", color:"#7A7A9A", fontSize:14, fontWeight:700 }}>キャンセル</Btn>
                    <Btn onClick={() => deleteStaff(deleteConfirm)} style={{ flex:1, padding:12, borderRadius:14, background:"linear-gradient(135deg,#FF6584,#FF9BAD)", color:"white", fontSize:14, fontWeight:800 }}>削除する</Btn>
                  </div>
                </div>
              </div>
            )}
          </div>
        )}

        {/* ===== CLOSING ===== */}
        {screen === SCREENS.CLOSING && (
          <div style={{ padding:16 }}>
            <div style={{ fontSize:18, fontWeight:800, color:"#1A1A3A", marginBottom:4 }}>🌙 終礼</div>
            <div style={{ fontSize:12, color:"#9A9AB0", marginBottom:18 }}>内容を入力するとAIが自動でマニュアルにまとめます</div>


            <div style={{ background:"white", borderRadius:18, padding:18, boxShadow:"0 4px 16px rgba(0,0,0,.07)", marginBottom:14 }}>
              <div style={{ fontSize:13, fontWeight:700, color:"#4facfe", marginBottom:8 }}>📅 日付</div>
              <input type="date" value={closingDate} onChange={e => setClosingDate(e.target.value)} style={{ width:"100%", border:"1.5px solid #E8EEFF", borderRadius:12, padding:"10px 14px", fontSize:14, color:"#1A1A3A", outline:"none", boxSizing:"border-box" }} />
            </div>
            <div style={{ background:"white", borderRadius:18, padding:18, boxShadow:"0 4px 16px rgba(0,0,0,.07)", marginBottom:14 }}>
              <div style={{ fontSize:13, fontWeight:700, color:"#4facfe", marginBottom:8 }}>📝 終礼メモ</div>
              <div style={{ fontSize:11, color:"#9A9AB0", marginBottom:8 }}>箇条書き・メモ書きでもOKです</div>
              <textarea value={closingText} onChange={e => setClosingText(e.target.value)} placeholder={"例：\n・グローブが不足中→Mサイズを代用\n・滅菌器アラームの対応手順を確認\n・来週月曜は早出をお願い"} style={{ width:"100%", border:"1.5px solid #E8EEFF", borderRadius:12, padding:"12px 14px", fontSize:13, color:"#1A1A3A", outline:"none", resize:"none", minHeight:130, lineHeight:1.7, boxSizing:"border-box", fontFamily:"inherit" }} />
            </div>
            <Btn onClick={generateManual} style={{ width:"100%", padding:15, borderRadius:18, background:closingText.trim()?"linear-gradient(135deg,#4facfe,#00f2fe)":"#DDDDEE", color:"white", fontSize:15, fontWeight:800, boxShadow:closingText.trim()?"0 6px 20px rgba(79,172,254,.4)":"none", marginBottom:16 }}>
              {closingLoading ? "✨ AIが生成中..." : "✨ AIでマニュアルを自動生成"}
            </Btn>
            {closingLoading && <div style={{ background:"white", borderRadius:18, padding:24, textAlign:"center", boxShadow:"0 4px 16px rgba(0,0,0,.07)" }}><div style={{ fontSize:32, marginBottom:10 }}>⚙️</div><div style={{ color:"#4facfe", fontWeight:700 }}>終礼内容を分析中...</div></div>}
            {closingResult && !closingResult.error && (
              <div style={{ background:"white", borderRadius:18, overflow:"hidden", boxShadow:"0 6px 24px rgba(79,172,254,.2)", marginBottom:14 }}>
                <div style={{ background:"linear-gradient(135deg,#4facfe,#00f2fe)", padding:"14px 18px" }}>
                  <div style={{ color:"white", fontSize:12, opacity:.85, marginBottom:2 }}>✨ AI生成マニュアル</div>
                  <div style={{ color:"white", fontSize:17, fontWeight:800 }}>{closingResult.title}</div>
                  <div style={{ color:"rgba(255,255,255,.8)", fontSize:12, marginTop:4 }}>カテゴリ：{closingResult.category}</div>
                </div>
                <div style={{ padding:18 }}>
                  {(closingResult.points||[]).map((p,i) => (
                    <div key={i} style={{ display:"flex", gap:10, marginBottom:8 }}>
                      <div style={{ width:20, height:20, borderRadius:"50%", background:"#4facfe22", color:"#4facfe", display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:800, flexShrink:0 }}>{i+1}</div>
                      <div style={{ fontSize:14, color:"#1A1A3A", lineHeight:1.6 }}>{p}</div>
                    </div>
                  ))}
                  {closingResult.notes && <div style={{ marginTop:14, background:"#FFF8E8", borderRadius:12, padding:"12px 14px" }}><div style={{ fontSize:12, fontWeight:700, color:"#F7971E", marginBottom:4 }}>⚠️ 注意事項</div><div style={{ fontSize:13, color:"#5A4A2A", lineHeight:1.6 }}>{closingResult.notes}</div></div>}
                </div>
                <div style={{ padding:"0 18px 18px", display:"flex", gap:10 }}>
                  <Btn onClick={() => setClosingResult(null)} style={{ flex:1, padding:12, borderRadius:14, background:"#F4F6FB", color:"#7A7A9A", fontSize:14, fontWeight:700 }}>やり直す</Btn>
                  <Btn onClick={addToManual} style={{ flex:2, padding:12, borderRadius:14, background:"linear-gradient(135deg,#43C6AC,#7EEAD6)", color:"white", fontSize:14, fontWeight:800, boxShadow:"0 4px 14px rgba(67,198,172,.4)" }}>📖 マニュアルに追加</Btn>
                </div>
              </div>
            )}
            {closingResult?.error && <div style={{ background:"#FFF0F0", borderRadius:14, padding:16, color:"#E84545", fontSize:13 }}>{closingResult.error}</div>}
            {closingHistory.length > 0 && (
              <div style={{ background:"white", borderRadius:18, overflow:"hidden", boxShadow:"0 4px 14px rgba(0,0,0,.07)", marginTop:8 }}>
                <div style={{ padding:"14px 18px", borderBottom:"1px solid #F4F6FB", fontSize:14, fontWeight:800, color:"#1A1A3A" }}>📚 過去の終礼</div>
                {closingHistory.map(h => (
                  <div key={h.id} style={{ padding:"12px 18px", borderBottom:"1px solid #F4F6FB" }}>
                    <div style={{ fontSize:13, fontWeight:700, color:"#2A2A4A" }}>{h.date}</div>
                    <div style={{ fontSize:12, color:"#9A9AB0", marginTop:2 }}>→「{h.manual.title}」をマニュアルに追加</div>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {/* ===== MANUAL ===== */}
        {screen === SCREENS.MANUAL && !selectedManual && (
          <div style={{ padding:16 }}>
            <div style={{ fontSize:18, fontWeight:800, color:"#1A1A3A", marginBottom:14 }}>マニュアル</div>
            <div style={{ display:"flex", gap:8, marginBottom:16, overflowX:"auto", paddingBottom:4 }}>
              {categories.map(c => <Btn key={c} onClick={() => setManualCategory(c)} style={{ padding:"8px 16px", borderRadius:28, background:manualCategory===c?"linear-gradient(135deg,#a18cd1,#fbc2eb)":"white", color:manualCategory===c?"white":"#5A5A7A", fontSize:13, fontWeight:700, whiteSpace:"nowrap", boxShadow:manualCategory===c?"0 4px 12px rgba(161,140,209,.35)":"0 2px 8px rgba(0,0,0,.07)" }}>{c}</Btn>)}
            </div>
            {filteredManuals.map(m => (
              <div key={m.id} onClick={() => setSelectedManual(m)} style={{ background:"white", borderRadius:16, marginBottom:10, boxShadow:"0 4px 14px rgba(0,0,0,.07)", overflow:"hidden", display:"flex", cursor:"pointer" }}>
                <div style={{ width:6, background:m.color, flexShrink:0 }} />
                <div style={{ display:"flex", alignItems:"center", gap:14, padding:"14px 16px", flex:1 }}>
                  <div style={{ width:42, height:42, borderRadius:12, background:m.color+"20", display:"flex", alignItems:"center", justifyContent:"center", fontSize:22, flexShrink:0 }}>{m.fromClosing?"📝":m.icon}</div>
                  <div style={{ flex:1 }}>
                    <div style={{ display:"flex", alignItems:"center", gap:6 }}>
                      <div style={{ fontSize:14, fontWeight:700, color:"#1A1A3A" }}>{m.title}</div>
                      {m.fromClosing && <span style={{ background:"#4facfe22", color:"#4facfe", fontSize:9, fontWeight:700, padding:"1px 6px", borderRadius:6 }}>AI</span>}
                    </div>
                    <div style={{ fontSize:11, color:"#9A9AB0", marginTop:2 }}>{m.category} · 更新 {m.updated}</div>
                  </div>
                  <div style={{ color:"#CCCCDD", fontSize:20 }}>›</div>
                </div>
              </div>
            ))}
          </div>
        )}
        {screen === SCREENS.MANUAL && selectedManual && (
          <div style={{ padding:16 }}>
            <Btn onClick={() => setSelectedManual(null)} style={{ background:"none", color:"#a18cd1", fontSize:14, fontWeight:700, padding:"0 0 14px" }}>‹ 戻る</Btn>
            <div style={{ background:"white", borderRadius:18, overflow:"hidden", boxShadow:"0 4px 14px rgba(0,0,0,.07)" }}>
              <div style={{ height:6, background:`linear-gradient(90deg,${selectedManual.color},${selectedManual.color}88)` }} />
              <div style={{ padding:20 }}>
                <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:12 }}>
                  <div style={{ width:44, height:44, borderRadius:14, background:selectedManual.color+"22", display:"flex", alignItems:"center", justifyContent:"center", fontSize:24 }}>{selectedManual.fromClosing?"📝":selectedManual.icon}</div>
                  <div><div style={{ fontSize:17, fontWeight:800, color:"#1A1A3A" }}>{selectedManual.title}</div><div style={{ fontSize:12, color:"#9A9AB0" }}>{selectedManual.category} · {selectedManual.updated}</div></div>
                </div>
                {selectedManual.content ? selectedManual.content.split("\n").filter(Boolean).map((line,i) => (
                  <div key={i} style={{ display:"flex", gap:10, marginBottom:8 }}>
                    <div style={{ width:20, height:20, borderRadius:"50%", background:selectedManual.color+"22", color:selectedManual.color, display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:800, flexShrink:0 }}>{i+1}</div>
                    <div style={{ fontSize:14, color:"#1A1A3A", lineHeight:1.6 }}>{line}</div>
                  </div>
                )) : <div style={{ color:"#9A9AB0", fontSize:14, textAlign:"center", padding:"20px 0" }}>内容準備中です</div>}
                {selectedManual.notes && <div style={{ marginTop:16, background:"#FFF8E8", borderRadius:12, padding:"12px 14px" }}><div style={{ fontSize:12, fontWeight:700, color:"#F7971E", marginBottom:4 }}>⚠️ 注意事項</div><div style={{ fontSize:13, color:"#5A4A2A", lineHeight:1.6 }}>{selectedManual.notes}</div></div>}
              </div>
            </div>
          </div>
        )}

        {/* ===== SHIFT REQUEST ===== */}
        {screen === SCREENS.REQUEST && (() => {
          // 28日分の日付生成（選択中の年月の第1月曜から）
          const getDays = () => {
            const days = [];
            const dayNames = ["日","月","火","水","木","金","土"];
            // 選択月の最初の月曜を探す
            let d = new Date(reqYear, reqMonth - 1, 1);
            while (d.getDay() !== 1) d.setDate(d.getDate() + 1);
            for (let i = 0; i < 28; i++) {
              const dd = new Date(d);
              dd.setDate(d.getDate() + i);
              const dow = dd.getDay();
              const dateStr = `${dd.getFullYear()}/${String(dd.getMonth()+1).padStart(2,"0")}/${String(dd.getDate()).padStart(2,"0")}`;
              days.push({ dateStr, dow, dayName: dayNames[dow], isSun: dow===0, isSat: dow===6 });
            }
            return days;
          };
          const days = getDays();
          const REQUEST_TYPES = [
            { key:"希望休", label:"休", color:"#FF6584", bg:"#FFE4E4" },
            { key:"有給", label:"有給", color:"#4facfe", bg:"#E4F4FF" },
            { key:"希望出勤", label:"出勤", color:"#43C6AC", bg:"#E4FFE4" },
          ];
          return (
            <div style={{ padding:16 }}>
              <div style={{ fontSize:18, fontWeight:800, color:"#1A1A3A", marginBottom:4 }}>✋ シフト・有給希望</div>
              <div style={{ fontSize:12, color:"#9A9AB0", marginBottom:16 }}>希望をタップして申請→スプレッドシートに自動反映</div>

              {/* スタッフ選択 */}
              <div style={{ background:"white", borderRadius:18, padding:16, boxShadow:"0 4px 14px rgba(0,0,0,.07)", marginBottom:12 }}>
                <div style={{ fontSize:13, fontWeight:700, color:"#FF6584", marginBottom:10 }}>👤 申請者</div>
                <div style={{ display:"flex", flexWrap:"wrap", gap:8 }}>
                  {staffList.map(s => (
                    <Btn key={s.id} onClick={() => setReqStaff(s.name)}
                      style={{ padding:"7px 14px", borderRadius:24, background:reqStaff===s.name?s.color:"#F4F6FB", color:reqStaff===s.name?"white":"#5A5A7A", fontSize:13, fontWeight:700, boxShadow:reqStaff===s.name?`0 4px 12px ${s.color}55`:"none" }}>
                      {s.name}
                    </Btn>
                  ))}
                </div>
              </div>

              {/* 年月選択 */}
              <div style={{ background:"white", borderRadius:18, padding:16, boxShadow:"0 4px 14px rgba(0,0,0,.07)", marginBottom:12 }}>
                <div style={{ fontSize:13, fontWeight:700, color:"#FF6584", marginBottom:10 }}>📅 対象月</div>
                <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                  <Btn onClick={() => { const d = new Date(reqYear, reqMonth-2); setReqYear(d.getFullYear()); setReqMonth(d.getMonth()+1); setReqDays({}); }}
                    style={{ width:36, height:36, borderRadius:"50%", background:"#F4F6FB", color:"#5A5A7A", fontSize:18, fontWeight:700 }}>‹</Btn>
                  <div style={{ flex:1, textAlign:"center", fontSize:16, fontWeight:800, color:"#1A1A3A" }}>{reqYear}年 {reqMonth}月</div>
                  <Btn onClick={() => { const d = new Date(reqYear, reqMonth); setReqYear(d.getFullYear()); setReqMonth(d.getMonth()+1); setReqDays({}); }}
                    style={{ width:36, height:36, borderRadius:"50%", background:"#F4F6FB", color:"#5A5A7A", fontSize:18, fontWeight:700 }}>›</Btn>
                </div>
              </div>

              {/* 凡例 */}
              <div style={{ display:"flex", gap:8, marginBottom:12, flexWrap:"wrap" }}>
                {REQUEST_TYPES.map(t => (
                  <div key={t.key} style={{ display:"flex", alignItems:"center", gap:4 }}>
                    <div style={{ width:14, height:14, borderRadius:4, background:t.bg, border:`1.5px solid ${t.color}` }} />
                    <span style={{ fontSize:11, color:"#7A7A9A", fontWeight:600 }}>{t.label}</span>
                  </div>
                ))}
                <div style={{ display:"flex", alignItems:"center", gap:4 }}>
                  <div style={{ width:14, height:14, borderRadius:4, background:"#F4F6FB" }} />
                  <span style={{ fontSize:11, color:"#7A7A9A" }}>タップで切替</span>
                </div>
              </div>

              {/* 28日カレンダー */}
              <div style={{ background:"white", borderRadius:18, overflow:"hidden", boxShadow:"0 4px 14px rgba(0,0,0,.07)", marginBottom:14 }}>
                {/* 曜日ヘッダー */}
                <div style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", background:"#6C63FF" }}>
                  {["月","火","水","木","金","土","日"].map(d => (
                    <div key={d} style={{ textAlign:"center", padding:"8px 0", fontSize:11, fontWeight:800, color:"white" }}>{d}</div>
                  ))}
                </div>
                {/* 日付グリッド（4週） */}
                {[0,1,2,3].map(week => (
                  <div key={week} style={{ display:"grid", gridTemplateColumns:"repeat(7,1fr)", borderBottom:week<3?"1px solid #F0F2F8":"none" }}>
                    {days.slice(week*7, week*7+7).map((day, di) => {
                      const selected = reqDays[day.dateStr];
                      const rt = REQUEST_TYPES.find(t => t.key === selected);
                      return (
                        <Btn key={di} onClick={() => {
                          setReqDays(prev => {
                            const next = {...prev};
                            if (!next[day.dateStr]) next[day.dateStr] = "希望休";
                            else if (next[day.dateStr] === "希望休") next[day.dateStr] = "有給";
                            else if (next[day.dateStr] === "有給") next[day.dateStr] = "希望出勤";
                            else delete next[day.dateStr];
                            return next;
                          });
                        }} style={{
                          padding:"8px 2px", textAlign:"center",
                          background: rt ? rt.bg : day.isSun ? "#FFF0F5" : day.isSat ? "#FFF8F0" : "white",
                          borderLeft: di > 0 ? "1px solid #F0F2F8" : "none",
                          position:"relative"
                        }}>
                          <div style={{ fontSize:13, fontWeight:700, color: rt ? rt.color : day.isSun?"#FF6584":day.isSat?"#F7971E":"#1A1A3A" }}>
                            {day.dateStr.split("/")[2]}
                          </div>
                          {rt && <div style={{ fontSize:9, fontWeight:800, color:rt.color, marginTop:1 }}>{rt.label}</div>}
                        </Btn>
                      );
                    })}
                  </div>
                ))}
              </div>

              {/* 選択サマリー */}
              {Object.keys(reqDays).length > 0 && (
                <div style={{ background:"white", borderRadius:16, padding:14, boxShadow:"0 4px 14px rgba(0,0,0,.07)", marginBottom:14 }}>
                  <div style={{ fontSize:13, fontWeight:700, color:"#1A1A3A", marginBottom:8 }}>申請内容（{Object.keys(reqDays).length}件）</div>
                  {REQUEST_TYPES.map(t => {
                    const items = Object.entries(reqDays).filter(([,v]) => v===t.key);
                    if (!items.length) return null;
                    return (
                      <div key={t.key} style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
                        <div style={{ background:t.bg, color:t.color, fontSize:11, fontWeight:800, padding:"3px 10px", borderRadius:8 }}>{t.label}</div>
                        <div style={{ fontSize:12, color:"#5A5A7A" }}>{items.map(([d]) => d.slice(5)).join("、")}</div>
                      </div>
                    );
                  })}
                </div>
              )}

              {/* 提出ボタン */}
              <Btn onClick={submitRequest}
                style={{ width:"100%", padding:15, borderRadius:18, background:Object.keys(reqDays).length>0?"linear-gradient(135deg,#FF6584,#FF9BAD)":"#DDDDEE", color:"white", fontSize:15, fontWeight:800, boxShadow:Object.keys(reqDays).length>0?"0 6px 20px rgba(255,101,132,.4)":"none", marginBottom:12 }}>
                {reqSubmitting ? "送信中..." : Object.keys(reqDays).length>0 ? `✅ ${Object.keys(reqDays).length}件を申請する` : "日付をタップして希望を選んでください"}
              </Btn>

              {reqResult && (
                <div style={{ background:reqResult.success?"#E8FFF5":"#FFF0F0", borderRadius:14, padding:14, textAlign:"center" }}>
                  <div style={{ fontSize:14, fontWeight:700, color:reqResult.success?"#43C6AC":"#E84545" }}>
                    {reqResult.success ? "✓ " : "✗ "}{reqResult.message}
                  </div>
                  {reqResult.success && <div style={{ fontSize:12, color:"#9A9AB0", marginTop:4 }}>スプレッドシートに反映されました</div>}
                </div>
              )}
            </div>
          );
        })()}

        {/* ===== SHIFT ===== */}
        {screen === SCREENS.SHIFT && (
          <div style={{ padding:16 }}>
            <div style={{ fontSize:18, fontWeight:800, color:"#1A1A3A", marginBottom:4 }}>シフト表</div>
            <div style={{ fontSize:12, color:"#9A9AB0", marginBottom:14 }}>2026年4月〜5月 · 月曜始まり</div>
            <div style={{ display:"flex", gap:8, marginBottom:14, overflowX:"auto" }}>
              {[1,2,3,4].map((w,i) => <Btn key={w} onClick={() => setShiftWeek(i)} style={{ padding:"8px 16px", borderRadius:28, background:shiftWeek===i?"linear-gradient(135deg,#F7971E,#FFD200)":"white", color:shiftWeek===i?"white":"#5A5A7A", fontSize:13, fontWeight:700, whiteSpace:"nowrap", boxShadow:shiftWeek===i?"0 4px 12px rgba(247,151,30,.4)":"0 2px 8px rgba(0,0,0,.07)" }}>第{w}週</Btn>)}
            </div>
            <div style={{ display:"flex", gap:8, marginBottom:14, flexWrap:"wrap" }}>
              {Object.entries(SHIFT_COLORS).map(([k,v]) => (
                <div key={k} style={{ display:"flex", alignItems:"center", gap:4 }}>
                  <div style={{ width:10, height:10, borderRadius:3, background:v.bg, border:`1.5px solid ${v.text}` }} />
                  <span style={{ fontSize:11, color:"#7A7A9A" }}>{v.label}</span>
                </div>
              ))}
            </div>
            {weeks[shiftWeek].map((day, di) => (
              <div key={di} style={{ background:"white", borderRadius:16, marginBottom:10, boxShadow:"0 4px 14px rgba(0,0,0,.06)", overflow:"hidden" }}>
                <div style={{ background:day.isSunday?"#FFF0F5":day.isSat?"#FFF8F0":day.dow===1?"#FFFAF0":"#FAFBFF", padding:"10px 16px", display:"flex", alignItems:"center", gap:8, borderBottom:"1px solid #F4F6FB" }}>
                  <div style={{ fontWeight:800, fontSize:14, color:day.isSunday?"#FF6584":day.isSat?"#F7971E":day.dow===1?"#F7971E":"#1A1A3A" }}>{day.label}</div>
                  {day.isSunday && <span style={{ background:"#FF658422", color:"#FF6584", fontSize:10, fontWeight:700, padding:"2px 8px", borderRadius:6 }}>休診</span>}
                  {day.isSat && <span style={{ background:"#F7971E22", color:"#F7971E", fontSize:10, fontWeight:700, padding:"2px 8px", borderRadius:6 }}>土曜</span>}
                  {day.dow===1 && <span style={{ background:"#6C63FF22", color:"#6C63FF", fontSize:10, fontWeight:700, padding:"2px 8px", borderRadius:6 }}>週始</span>}
                </div>
                <div style={{ padding:"10px 16px", display:"flex", flexDirection:"column", gap:7 }}>
                  {staffNames.map(name => {
                    const shift = day.shifts[name]||"休";
                    const sc = SHIFT_COLORS[shift]||SHIFT_COLORS["休"];
                    const staffObj = staffList.find(s => s.name===name);
                    return (
                      <div key={name} style={{ display:"flex", alignItems:"center", gap:10 }}>
                        <div style={{ width:26, height:26, borderRadius:"50%", background:(staffObj?.color||"#999")+"33", display:"flex", alignItems:"center", justifyContent:"center", fontSize:11, fontWeight:700, color:staffObj?.color||"#999", flexShrink:0 }}>{avatarChar(name)}</div>
                        <div style={{ width:34, fontSize:13, fontWeight:600, color:"#2A2A4A" }}>{name}</div>
                        <div style={{ background:sc.bg, color:sc.text, fontSize:12, fontWeight:700, padding:"4px 12px", borderRadius:10, border:`1px solid ${sc.text}33` }}>{sc.label}</div>
                        {shift!=="休" && <div style={{ fontSize:11, color:"#9A9AB0" }}>{shift}</div>}
                      </div>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Bottom Nav */}
      <div style={{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:430, background:"white", borderTop:"1px solid #EEEEF8", display:"grid", gridTemplateColumns:"repeat(5, 1fr)", boxShadow:"0 -6px 24px rgba(0,0,0,.08)", zIndex:100 }}>
        {navItems.map(item => {
          const active = screen === item.s;
          return (
            <Btn key={item.label} onClick={() => go(item.s)} style={{ background:"none", padding:"10px 0 8px", display:"flex", flexDirection:"column", alignItems:"center", gap:2 }}>
              <div style={{ width:40, height:40, borderRadius:14, background:active?item.color+"18":"transparent", display:"flex", alignItems:"center", justifyContent:"center", fontSize:20 }}>{item.icon}</div>
              <span style={{ fontSize:9.5, color:active?item.color:"#AAAACC", fontWeight:active?800:500 }}>{item.label}</span>
            </Btn>
          );
        })}
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
